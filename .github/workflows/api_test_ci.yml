name: Forum API Automation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest # GitHub 的 Ubuntu 环境非常全，通常不直接在 runner 上谈 slim

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: forum_db
        ports:
          - 3309:3306 
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'  # 修正为你的开发版本
        cache: 'pip'          # 🚀 开启缓存机制：只要 requirements.txt 没变，下次秒装

    - name: 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 启动后端并运行测试
      env:
        SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      run: |
        # 使用你之前的 Bcrypt 和 JWT 逻辑
        nohup uvicorn main:app --host 0.0.0.0 --port 8000 & 
        sleep 10
        pytest --alluredir=./allure-results

    - name: 发布 Allure 报告
      if: always()
      uses: mgrybyk-org/allure-report-branch-action@v1
      with:
        report_dir: allure-results
        gh_pages: gh-pages