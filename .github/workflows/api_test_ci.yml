name: Forum API Automation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

# 💡 补丁 1：显式声明权限，确保机器人有权把报告塞进 gh-pages 分支
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: forum_db
        ports:
          - 3309:3306 
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        # 💡 补丁 2：关键！拉取所有分支的历史记录，否则机器人找不到 gh-pages
        fetch-depth: 0 

    - name: 设置 Python 3.9 环境
      uses: actions/setup-python@v5 # 建议升级到 v5 更稳定
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 启动后端并运行测试
      env:
        SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      run: |
        # 确保启动后端并留出时间
        nohup uvicorn main:app --host 0.0.0.0 --port 8000 & 
        sleep 15 # 云端机器有时起步慢，给它 15 秒
        # 即使测试失败也要继续，保证后面能生成报告
        pytest --alluredir=./allure-results || true 

    - name: 发布 Allure 报告
      if: always()
      uses: mgrybyk-org/allure-report-branch-action@v1
      with:
        report_dir: allure-results
        gh_pages: gh-pages